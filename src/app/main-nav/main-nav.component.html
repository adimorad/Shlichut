<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport="false"
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'over'"
    [opened]="!(isHandset$ | async)"
    position="end">
    <mat-toolbar color="primary">
        <span class="toolbarClass"></span>
      תפריט
      
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item href="#">
          <span class="toolbarClass"></span>
        פעילויות
      </a>
      <a mat-list-item href="#">
          <span class="toolbarClass"></span>
        תמונות
      </a>
      <a mat-list-item href="#">
          <span class="toolbarClass"></span>
        כתיבה לרבי
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <span>בית חב"ד פדואל</span>
      <span class="toolbarClass"></span>
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        >
        <mat-icon svgIcon="thumbs-up"></mat-icon>
      </button>
    </mat-toolbar>
    <!-- Add Content Here -->
  </mat-sidenav-content>
</mat-sidenav-container>
